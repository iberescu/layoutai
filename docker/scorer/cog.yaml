# Replicate / Cog config for the layout.ai TRIBE v2 creative scorer.
# Deploy with:
#   cog push r8.im/<your-replicate-handle>/layout-tribe-scorer
# Then set REPLICATE_TRIBE_MODEL=<your-handle>/layout-tribe-scorer:<version-hash>
# in your layout.ai .env (the version hash is shown after a successful push).
build:
  gpu: true
  python_version: "3.11"
  python_packages:
    - "torch==2.4.0"
    - "torchaudio==2.4.0"
    - "torchvision==0.19.0"
    # AutoVideoProcessor landed in transformers 4.49 — TRIBE v2 needs it.
    - "transformers>=4.49,<4.55"
    - "huggingface_hub>=0.25,<0.30"
    - "pillow==10.4.0"
    - "numpy==1.26.4"
    - "scipy==1.13.0"
    - "nilearn==0.11.1"
  system_packages:
    - "ffmpeg"
    - "git"
  run:
    - "pip install git+https://github.com/facebookresearch/tribev2.git@main"
    # tribev2 is unpinned on transformers and pulls in an old version that
    # doesn't have AutoVideoProcessor. Force the right version AFTER the
    # tribev2 install so it stays.
    - "pip install --upgrade 'transformers>=4.49,<4.55'"
    - "python -c 'from transformers import AutoVideoProcessor; print(\"AutoVideoProcessor OK\")'"

predict: "predict.py:Predictor"
