<!doctype html><html><head><meta charset="utf-8">{{fonts_link}}
<style>
  html,body{margin:0}
  .ad{position:relative;width:{{w}}px;height:{{h}}px;overflow:hidden;font-family:{{body_font}};
      display:flex;flex-direction:column;background:{{primary}};color:{{on_primary}};}
  .hero{flex:0 0 60%;position:relative;{{hero_css}}}
  .logo{position:absolute;top:44px;left:44px;z-index:3;background:{{chip_bg}};border-radius:14px;padding:14px 20px;}
  .logo img{display:block;height:56px;width:auto;max-width:320px;}
  .copy{flex:1;padding:56px 60px;display:flex;flex-direction:column;}
  .headline{font-family:{{headline_font}};font-weight:800;font-size:80px;line-height:1.02;
            letter-spacing:-.02em;margin:0 0 22px;
            display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
  .sub{font-size:34px;opacity:.92;line-height:1.28;
       display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .cta{margin-top:auto;align-self:flex-start;background:{{on_primary}};color:{{primary}};
       font-weight:700;font-size:36px;padding:26px 54px;border-radius:999px;}
</style></head>
<body><div class="ad">
  <div class="hero">{{logo_block}}</div>
  <div class="copy">
    <div class="headline">{{headline}}</div>
    {{sub_block}}
    <span class="cta">{{cta}}</span>
  </div>
</div></body></html>
