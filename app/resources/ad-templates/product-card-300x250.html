<!doctype html><html><head><meta charset="utf-8">{{fonts_link}}
<style>
  html,body{margin:0}
  .ad{position:relative;width:{{w}}px;height:{{h}}px;overflow:hidden;font-family:{{body_font}};
      background:#fff;display:flex;flex-direction:column;}
  .hero{flex:0 0 52%;{{hero_css}}}
  .logo{position:absolute;top:10px;left:10px;z-index:3;background:{{chip_bg}};border-radius:6px;padding:4px 6px;
        box-shadow:0 1px 4px rgba(0,0,0,.15);}
  .logo img{display:block;height:19px;width:auto;max-width:100px;}
  .info{flex:1;padding:13px 14px;display:flex;flex-direction:column;justify-content:center;gap:10px;}
  .title{font-family:{{headline_font}};font-weight:700;font-size:17px;line-height:1.15;color:{{secondary}};
          overflow-wrap:anywhere;
          display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .price{font-family:{{headline_font}};font-weight:800;font-size:20px;color:{{primary}};white-space:nowrap;}
  .cta{background:{{primary}};color:{{on_primary}};font-weight:700;font-size:12px;
       padding:9px 14px;border-radius:8px;white-space:nowrap;}
</style></head>
<body><div class="ad">
  <div class="hero">{{logo_block}}</div>
  <div class="info">
    <div class="title">{{headline}}</div>
    <div class="row">{{price_block}}<span class="cta">{{cta}}</span></div>
  </div>
</div></body></html>
