<!doctype html><html><head><meta charset="utf-8">{{fonts_link}}
<style>
  html,body{margin:0}
  .ad{position:relative;width:{{w}}px;height:{{h}}px;overflow:hidden;font-family:{{body_font}};
      background:linear-gradient(180deg,{{primary}} 0%,{{primary}} 62%,{{accent}} 130%);color:{{on_primary}};
      display:flex;flex-direction:column;padding:18px 16px;}
  .logo{margin-bottom:18px;background:{{chip_bg}};border-radius:6px;padding:4px 6px;align-self:flex-start;}
  .logo img{display:block;height:18px;width:auto;max-width:110px;}
  .headline{font-family:{{headline_font}};font-weight:800;font-size:25px;line-height:1.05;
            letter-spacing:-.02em;margin:0 0 10px;overflow-wrap:anywhere;
            display:-webkit-box;-webkit-line-clamp:8;-webkit-box-orient:vertical;overflow:hidden;}
  .sub{font-size:13px;opacity:.92;line-height:1.3;
       display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
  .cta{margin-top:auto;text-align:center;background:{{on_primary}};color:{{primary}};font-weight:700;
       font-size:14px;padding:12px 14px;border-radius:8px;}
</style></head>
<body><div class="ad">
  {{logo_block}}
  <div class="headline">{{headline}}</div>
  {{sub_block}}
  <span class="cta">{{cta}}</span>
</div></body></html>
