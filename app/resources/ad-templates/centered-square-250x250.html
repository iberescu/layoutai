<!doctype html><html><head><meta charset="utf-8">{{fonts_link}}
<style>
  html,body{margin:0}
  .ad{position:relative;width:{{w}}px;height:{{h}}px;overflow:hidden;font-family:{{body_font}};
      background:radial-gradient(120% 120% at 50% 0%,{{accent}} 0%,{{primary}} 70%);
      color:{{on_primary}};display:flex;flex-direction:column;align-items:center;
      justify-content:center;text-align:center;padding:22px;}
  .logo{margin-bottom:14px;background:{{chip_bg}};border-radius:7px;padding:5px 8px;}
  .logo img{display:block;height:22px;width:auto;max-width:130px;}
  .headline{font-family:{{headline_font}};font-weight:800;font-size:25px;line-height:1.06;
            letter-spacing:-.01em;margin:0 0 6px;
            display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .sub{font-size:12px;opacity:.9;margin-bottom:14px;
       display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .cta{background:{{on_primary}};color:{{primary}};font-weight:700;font-size:13px;
       padding:9px 18px;border-radius:999px;}
</style></head>
<body><div class="ad">
  {{logo_block}}
  <div class="headline">{{headline}}</div>
  {{sub_block}}
  <span class="cta">{{cta}}</span>
</div></body></html>
