<!doctype html><html><head><meta charset="utf-8">{{fonts_link}}
<style>
  html,body{margin:0}
  .ad{position:relative;width:{{w}}px;height:{{h}}px;overflow:hidden;font-family:{{body_font}};
      display:flex;flex-direction:column;background:{{primary}};color:{{on_primary}};}
  .hero{flex:0 0 48%;position:relative;{{hero_css}}}
  .logo{position:absolute;top:12px;left:12px;z-index:3;background:{{chip_bg}};border-radius:6px;padding:4px 6px;}
  .logo img{display:block;height:18px;width:auto;max-width:110px;}
  .copy{flex:1;padding:18px 16px;display:flex;flex-direction:column;}
  .headline{font-family:{{headline_font}};font-weight:800;font-size:23px;line-height:1.05;
            letter-spacing:-.01em;margin:0 0 8px;overflow-wrap:anywhere;
            display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden;}
  .sub{font-size:13px;opacity:.92;line-height:1.3;
       display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
  .cta{margin-top:auto;text-align:center;background:{{on_primary}};color:{{primary}};font-weight:700;
       font-size:14px;padding:12px 14px;border-radius:8px;}
</style></head>
<body><div class="ad">
  <div class="hero">{{logo_block}}</div>
  <div class="copy">
    <div class="headline">{{headline}}</div>
    {{sub_block}}
    <span class="cta">{{cta}}</span>
  </div>
</div></body></html>
