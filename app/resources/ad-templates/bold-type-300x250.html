<!doctype html><html><head><meta charset="utf-8">{{fonts_link}}
<style>
  html,body{margin:0}
  .ad{position:relative;width:{{w}}px;height:{{h}}px;overflow:hidden;
      background:linear-gradient(135deg,{{primary}} 0%,{{accent}} 100%);
      color:{{on_primary}};font-family:{{body_font}};display:flex;flex-direction:column;
      justify-content:flex-end;padding:20px;}
  .logo{position:absolute;top:14px;left:14px;background:{{chip_bg}};border-radius:7px;padding:5px 7px;
        box-shadow:0 1px 4px rgba(0,0,0,.15);}
  .logo img{display:block;height:20px;width:auto;max-width:120px;}
  .headline{font-family:{{headline_font}};font-weight:800;font-size:30px;line-height:1.04;
            letter-spacing:-.02em;margin:0 0 6px;
            display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .sub{font-size:13px;opacity:.92;line-height:1.25;margin-bottom:12px;
       display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .cta{align-self:flex-start;background:{{on_primary}};color:{{primary}};font-weight:700;
       font-size:13px;padding:9px 16px;border-radius:999px;}
</style></head>
<body><div class="ad">
  {{logo_block}}
  <div class="headline">{{headline}}</div>
  {{sub_block}}
  <span class="cta">{{cta}}</span>
</div></body></html>
