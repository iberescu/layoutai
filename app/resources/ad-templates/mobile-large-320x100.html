<!doctype html><html><head><meta charset="utf-8">{{fonts_link}}
<style>
  html,body{margin:0}
  .ad{position:relative;width:{{w}}px;height:{{h}}px;overflow:hidden;font-family:{{body_font}};
      background:linear-gradient(100deg,{{primary}} 0%,{{accent}} 100%);color:{{on_primary}};
      display:flex;align-items:center;gap:10px;padding:0 12px;}
  .logo{flex:none;background:{{chip_bg}};border-radius:6px;padding:4px 5px;}
  .logo img{display:block;height:24px;width:auto;max-width:52px;}
  .mid{flex:1;min-width:0;}
  .headline{font-family:{{headline_font}};font-weight:800;font-size:19px;line-height:1.08;overflow-wrap:anywhere;
            display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .cta{flex:none;background:{{on_primary}};color:{{primary}};font-weight:700;font-size:13px;
       padding:9px 14px;border-radius:7px;white-space:nowrap;}
</style></head>
<body><div class="ad">
  {{logo_block}}
  <div class="mid"><div class="headline">{{headline}}</div>{{sub_block}}</div>
  <span class="cta">{{cta}}</span>
</div></body></html>
