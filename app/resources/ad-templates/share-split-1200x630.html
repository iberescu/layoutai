<!doctype html><html><head><meta charset="utf-8">{{fonts_link}}
<style>
  html,body{margin:0}
  .ad{position:relative;width:{{w}}px;height:{{h}}px;overflow:hidden;font-family:{{body_font}};
      display:flex;background:{{primary}};color:{{on_primary}};}
  .copy{flex:1;padding:72px 76px;display:flex;flex-direction:column;justify-content:center;}
  .logo{display:inline-block;background:{{chip_bg}};border-radius:12px;padding:12px 18px;margin-bottom:32px;align-self:flex-start;}
  .logo img{display:block;height:48px;width:auto;max-width:260px;}
  .headline{font-family:{{headline_font}};font-weight:800;font-size:66px;line-height:1.02;
            letter-spacing:-.02em;margin:0 0 18px;
            display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .sub{font-size:26px;opacity:.92;margin-bottom:32px;line-height:1.3;
       display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .cta{align-self:flex-start;background:{{on_primary}};color:{{primary}};font-weight:700;
       font-size:26px;padding:20px 40px;border-radius:12px;}
  .panel{flex:0 0 42%;{{hero_css}}}
</style></head>
<body><div class="ad">
  <div class="copy">
    {{logo_block}}
    <div class="headline">{{headline}}</div>
    {{sub_block}}
    <span class="cta">{{cta}}</span>
  </div>
  <div class="panel"></div>
</div></body></html>
