<!doctype html><html><head><meta charset="utf-8">{{fonts_link}}
<style>
  html,body{margin:0}
  .ad{position:relative;width:{{w}}px;height:{{h}}px;overflow:hidden;color:#fff;
      font-family:{{body_font}};{{hero_css}}}
  .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(11,18,32,.10) 0%,rgba(11,18,32,.82) 78%);}
  .logo{position:absolute;top:14px;left:14px;z-index:3;background:{{chip_bg}};border-radius:7px;padding:5px 7px;}
  .logo img{display:block;height:20px;width:auto;max-width:120px;}
  .content{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:18px;}
  .headline{font-family:{{headline_font}};font-weight:800;font-size:25px;line-height:1.06;
            letter-spacing:-.01em;margin:0 0 6px;text-shadow:0 1px 8px rgba(0,0,0,.35);
            display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .sub{font-size:12px;opacity:.92;margin-bottom:11px;
       display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .cta{display:inline-block;background:{{primary}};color:{{on_primary}};font-weight:700;
       font-size:12px;padding:9px 15px;border-radius:999px;}
</style></head>
<body><div class="ad">
  <div class="scrim"></div>
  {{logo_block}}
  <div class="content">
    <div class="headline">{{headline}}</div>
    {{sub_block}}
    <span class="cta">{{cta}}</span>
  </div>
</div></body></html>
