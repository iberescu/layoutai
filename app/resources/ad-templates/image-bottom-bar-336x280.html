<!doctype html><html><head><meta charset="utf-8">{{fonts_link}}
<style>
  html,body{margin:0}
  .ad{position:relative;width:{{w}}px;height:{{h}}px;overflow:hidden;font-family:{{body_font}};
      display:flex;flex-direction:column;background:{{secondary}};}
  .hero{flex:1;position:relative;{{hero_css}}}
  .hero .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(11,18,32,0) 40%,rgba(11,18,32,.55) 100%);}
  .logo{position:absolute;top:14px;left:14px;z-index:3;background:{{chip_bg}};border-radius:7px;padding:5px 7px;}
  .logo img{display:block;height:20px;width:auto;max-width:120px;}
  .headtext{position:absolute;left:16px;right:16px;bottom:14px;z-index:2;color:#fff;
            font-family:{{headline_font}};font-weight:800;font-size:23px;line-height:1.05;
            text-shadow:0 1px 8px rgba(0,0,0,.4);
            display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .bar{flex:0 0 56px;background:{{primary}};color:{{on_primary}};display:flex;align-items:center;
       justify-content:space-between;padding:0 18px;gap:10px;}
  .bar .sub{font-size:13px;font-weight:600;
            display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .cta{flex:none;background:{{on_primary}};color:{{primary}};font-weight:700;font-size:13px;
       padding:9px 15px;border-radius:999px;white-space:nowrap;}
</style></head>
<body><div class="ad">
  <div class="hero"><div class="scrim"></div>{{logo_block}}<div class="headtext">{{headline}}</div></div>
  <div class="bar">{{sub_block}}<span class="cta">{{cta}}</span></div>
</div></body></html>
