services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: layoutai/app:latest
    container_name: layoutai-app
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: layoutai
      DB_USERNAME: layoutai
      DB_PASSWORD: layoutai
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      FILESYSTEM_DISK: public
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      RUNMYPRINT_ENDPOINT: ${RUNMYPRINT_ENDPOINT:-https://www.runmyprint.com/test/image2.php}
      RENDERER_URL: http://renderer:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [layoutai]

  nginx:
    image: nginx:1.27-alpine
    container_name: layoutai-nginx
    ports:
      - "8088:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks: [layoutai]

  postgres:
    image: postgres:16-alpine
    container_name: layoutai-postgres
    environment:
      POSTGRES_DB: layoutai
      POSTGRES_USER: layoutai
      POSTGRES_PASSWORD: layoutai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U layoutai -d layoutai"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [layoutai]

  redis:
    image: redis:7-alpine
    container_name: layoutai-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [layoutai]

  worker:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: layoutai/app:latest
    container_name: layoutai-worker
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "--queue=high,crawl,ai,image,render,reporting,default", "--sleep=2", "--tries=3", "--timeout=900", "--memory=512"]
    volumes:
      - ./app:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: layoutai
      DB_USERNAME: layoutai
      DB_PASSWORD: layoutai
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      FILESYSTEM_DISK: public
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      RUNMYPRINT_ENDPOINT: ${RUNMYPRINT_ENDPOINT:-https://www.runmyprint.com/test/image2.php}
      RENDERER_URL: http://renderer:3000
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [layoutai]

  renderer:
    build:
      context: .
      dockerfile: docker/renderer/Dockerfile
    image: layoutai/renderer:latest
    container_name: layoutai-renderer
    environment:
      PORT: 3000
    networks: [layoutai]

volumes:
  postgres-data:

networks:
  layoutai:
    driver: bridge
