#cloud-config
# Bootstraps a fresh Ubuntu 22.04 Droplet to run the layout.ai stack.
# Installed by deploy.sh as user-data on the droplet at creation time.

package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - rsync
  - ufw

write_files:
  - path: /etc/systemd/system/layoutai.service
    permissions: '0644'
    content: |
      [Unit]
      Description=layout.ai docker compose stack
      Requires=docker.service
      After=docker.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/opt/layoutai
      ExecStart=/usr/bin/docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d
      ExecStop=/usr/bin/docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env down

      [Install]
      WantedBy=multi-user.target

runcmd:
  # Install Docker the official way (apt repo, not snap)
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker
  # Prepare the application directory; deploy.sh will rsync code into it.
  - mkdir -p /opt/layoutai
  - chown -R root:root /opt/layoutai
  # Firewall: allow SSH + HTTP only
  - ufw --force enable
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  # systemd unit waits for the rsync; we enable it but don't start until deploy.sh finishes pushing code
  - systemctl enable layoutai.service
  # Marker file the deploy script polls for to know cloud-init is complete
  - touch /var/lib/cloud/layoutai-ready
